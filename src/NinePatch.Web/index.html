<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nine-Patch Auto-Compressor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg: #0c0e12;
        --panel: #14171e;
        --panel-2: #1a1e27;
        --panel-hi: #232835;
        --line: #262b36;
        --line-hi: #323847;
        --text: #e6e8ee;
        --text-dim: #9aa1b1;
        --text-faint: #6b7384;
        --accent: oklch(0.74 0.14 230);
        --accent-dim: oklch(0.74 0.14 230 / 0.18);
        --danger: oklch(0.72 0.18 25);
        --ok: oklch(0.76 0.16 150);
        --np-x: oklch(0.78 0.16 230);
        --np-y: oklch(0.82 0.17 90);
      }
      * { box-sizing: border-box; margin: 0; }
      html, body, #root { height: 100%; }
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
        background: var(--bg);
        color: var(--text);
        font-size: 13px;
        -webkit-font-smoothing: antialiased;
      }
      .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; }

      .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; }
      .panel-flush { background: var(--panel); border: 1px solid var(--line); }
      .label { font-size: 11px; font-weight: 600; color: var(--text-dim); letter-spacing: 0.06em; text-transform: uppercase; }
      .label-lg { font-size: 12px; font-weight: 600; color: var(--text); letter-spacing: 0.02em; }
      .hint { font-size: 11px; color: var(--text-faint); }

      .btn {
        background: var(--accent); color: #0a0d12; padding: 9px 14px; border-radius: 7px;
        font-weight: 600; font-size: 13px; letter-spacing: 0.01em; border: none; cursor: pointer;
        transition: filter 0.12s, background 0.12s;
      }
      .btn:hover:not(:disabled) { filter: brightness(1.08); }
      .btn:disabled { background: var(--panel-hi); color: var(--text-faint); cursor: not-allowed; }

      .btn-ghost {
        background: var(--panel-2); color: var(--text); border: 1px solid var(--line);
        padding: 7px 12px; border-radius: 7px; font-size: 12px; font-weight: 500;
        cursor: pointer; transition: background 0.12s, border-color 0.12s;
      }
      .btn-ghost:hover { background: var(--panel-hi); border-color: var(--line-hi); }

      .seg {
        display: inline-flex; background: var(--bg); border: 1px solid var(--line);
        border-radius: 8px; padding: 2px; gap: 1px;
      }
      .seg button {
        padding: 5px 10px; font-size: 12px; font-weight: 500; color: var(--text-dim);
        border: none; border-radius: 6px; cursor: pointer;
        transition: background 0.1s, color 0.1s;
        display: inline-flex; align-items: center; gap: 5px;
      }
      .seg button[data-active="true"] {
        background: var(--panel-hi); color: var(--text);
        box-shadow: inset 0 0 0 1px var(--line-hi);
      }
      .seg button:hover:not([data-active="true"]) { color: var(--text); }

      input[type="number"], input[type="text"], input[type="range"] {
        background: var(--bg); border: 1px solid var(--line); color: var(--text);
        border-radius: 6px; padding: 6px 10px; font-size: 13px;
        font-family: 'JetBrains Mono', monospace;
        width: 100%;
      }
      input[type="number"]:focus, input[type="text"]:focus {
        outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim);
      }
      input[type="range"] {
        padding: 0; height: 4px; -webkit-appearance: none; appearance: none;
        background: var(--line); border: none;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
        background: var(--accent); cursor: pointer;
        box-shadow: 0 0 0 3px var(--bg), 0 0 0 4px var(--line-hi);
      }

      /* Transparency backgrounds */
      .bg-black-solid { background: #000; }
      .bg-white-solid { background: #fff; }
      .bg-checker-dark {
        background-color: #3a3a3a;
        background-image:
          linear-gradient(45deg, #2a2a2a 25%, transparent 25%),
          linear-gradient(-45deg, #2a2a2a 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, #2a2a2a 75%),
          linear-gradient(-45deg, transparent 75%, #2a2a2a 75%);
        background-size: 16px 16px;
        background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
      }
      .bg-checker-light {
        background-color: #ffffff;
        background-image:
          linear-gradient(45deg, #d4d4d4 25%, transparent 25%),
          linear-gradient(-45deg, #d4d4d4 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, #d4d4d4 75%),
          linear-gradient(-45deg, transparent 75%, #d4d4d4 75%);
        background-size: 16px 16px;
        background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
      }

      /* Workbench canvas with soft dots */
      .workbench {
        background:
          radial-gradient(circle at 1px 1px, rgba(255,255,255,0.025) 1px, transparent 0),
          var(--bg);
        background-size: 18px 18px;
      }

      .pixelated { image-rendering: pixelated; image-rendering: crisp-edges; }
      .no-select { user-select: none; -webkit-user-select: none; }
      .scrollbar-slim::-webkit-scrollbar { width: 8px; height: 8px; }
      .scrollbar-slim::-webkit-scrollbar-thumb { background: var(--line-hi); border-radius: 4px; }
      .scrollbar-slim::-webkit-scrollbar-track { background: transparent; }

      kbd {
        font-family: 'JetBrains Mono', monospace;
        background: var(--panel-2); border: 1px solid var(--line);
        border-bottom-width: 2px; border-radius: 4px;
        padding: 1px 5px; font-size: 10.5px; color: var(--text-dim);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
