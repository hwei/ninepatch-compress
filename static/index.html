<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nine-Patch Auto-Compress</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0e27; color: #ddd; font-family: 'Segoe UI', system-ui, sans-serif; padding: 20px; }
    h1 { font-size: 24px; margin-bottom: 16px; }

    .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
    select, input[type=file], button, input[type=number] {
      background: #1a1f3a; color: #ddd; border: 1px solid #334;
      border-radius: 4px; padding: 6px 10px; font-size: 14px;
    }
    button { cursor: pointer; background: #3a6df0; border: none; }
    button:hover { background: #5085f5; }
    button:disabled { opacity: 0.4; cursor: default; }

    .bg-buttons { display: flex; gap: 6px; align-items: center; margin-bottom: 10px; }
    .bg-buttons span { font-size: 13px; margin-right: 4px; }
    .bg-btn { padding: 4px 10px; font-size: 12px; border: 1px solid #555; border-radius: 3px; cursor: pointer; }
    .bg-btn.active { border-color: #3a6df0; box-shadow: 0 0 4px #3a6df0; }
    .bg-btn.b-black { background: #000; }
    .bg-btn.b-white { background: #fff; color: #000; }
    .bg-btn.b-checker { background: repeating-conic-gradient(#888 0% 25%, #ccc 0% 50%) 0 0 / 12px 12px; }

    /* Comparison slider area */
    .comparison-wrapper { display: flex; justify-content: center; margin-bottom: 16px; }
    .comparison-container {
      position: relative;
      border-radius: 8px; overflow: hidden;
      background: repeating-conic-gradient(#888 0% 25%, #ccc 0% 50%) 0 0 / 16px 16px;
    }
    .comparison-container.bg-black { background: #000; }
    .comparison-container.bg-white { background: #fff; }
    .comparison-container.bg-checker { background: repeating-conic-gradient(#888 0% 25%, #ccc 0% 50%) 0 0 / 16px 16px; }
    .comparison-container canvas {
      position: absolute; top: 0; left: 0; display: block;
      image-rendering: pixelated;
    }
    .comparison-container canvas.recon-canvas {
      clip-path: inset(0 50% 0 0); /* default: show left half */
    }
    .comp-label {
      position: absolute; top: 8px; font-size: 12px; font-weight: 600;
      padding: 2px 8px; border-radius: 3px; background: rgba(0,0,0,0.6);
      pointer-events: none; z-index: 3;
    }
    .comp-label.left-label { left: 8px; }
    .comp-label.right-label { right: 8px; }

    /* Draggable divider */
    .comp-divider {
      position: absolute; top: 0; left: 50%; width: 4px; height: 100%;
      background: #fff; z-index: 4; cursor: ew-resize;
      box-shadow: 0 0 6px rgba(0,0,0,0.5);
    }
    .comp-divider::after {
      content: '\2194'; position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%); background: #fff; color: #333;
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: bold;
    }

    /* Zoom controls */
    .zoom-controls { display:flex; align-items:center; margin:0 0 12px 0; font-size:13px; color:#999; }
    .zoom-controls select { margin-left:6px; background:#1a1f3a; color:#ddd; border:1px solid #334; border-radius:4px; padding:4px 8px; font-size:13px; }

    /* Compressed image row */
    .compressed-row {
      display: flex; flex-direction: column; align-items: center;
      margin-bottom: 16px;
    }
    .compressed-row h3 { font-size: 16px; margin-bottom: 8px; }
    .compressed-row canvas {
      border: 1px solid #334; border-radius: 4px;
      image-rendering: pixelated;
    }
    .compressed-info { font-size: 13px; color: #999; margin-top: 4px; }

    /* Results table */
    .results { font-size: 14px; line-height: 1.8; text-align: center; }
    .results table { border-collapse: collapse; margin: 0 auto; }
    .results td { padding: 4px 16px 4px 4px; border-bottom: 1px solid #222; }
    .results td:first-child { color: #aaa; }
    .results td:last-child { font-weight: 600; }

    .status { display: none; padding: 8px 12px; border-radius: 4px; margin-bottom: 12px; font-size: 14px; }
    .status.error { display: block; background: #4a1525; color: #f88; }
    .status.success { display: block; background: #153a1a; color: #8f8; }
    .status.info { display: block; background: #1a2a4a; color: #8af; }

    .dim-text { font-size: 12px; color: #777; margin-top: 2px; }

    /* Nine-patch DOM overlay */
    .ninepatch-overlay {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 5;
    }
    .np-edge { position: absolute; background: rgba(255,0,0,0.75); }
    .np-top, .np-bottom { height: 1px; left: 0; right: 0; }
    .np-left, .np-right { width: 1px; top: 0; bottom: 0; }

    .comp-canvas-wrapper {
      position: relative; display: inline-block;
    }
    .comp-canvas-wrapper canvas { display: block; }
  </style>
</head>
<body>
  <h1>Nine-Patch Auto-Compress</h1>

  <div class="controls">
    <label>Source:
      <select id="sourceSelect">
        <option value="upload">Upload PNG</option>
        <option value="samples">Sample...</option>
      </select>
    </label>
    <select id="sampleSelect" style="display:none;"></select>
    <input type="file" id="fileInput" accept="image/png" style="display:none;">
    <label>Error Threshold:
      <input type="number" id="thresholdInput" value="4" min="1" max="50" step="1" style="width:60px;">
    </label>
    <label>Min Savings %:
      <input type="number" id="minSavingsInput" value="30" min="0" max="100" step="5" style="width:60px;">
    </label>
    <label>Min Corner:
      <input type="number" id="minCornerInput" value="0" min="0" max="50" step="1" style="width:60px;">
    </label>
    <button id="runBtn" disabled>Run Compression</button>
  </div>

  <div id="status" class="status"></div>

  <!-- Background switcher -->
  <div class="bg-buttons">
    <span>Background:</span>
    <button class="bg-btn b-checker active" data-bg="checker" title="Checkerboard">&#x25f0;</button>
    <button class="bg-btn b-black" data-bg="black" title="Black background"></button>
    <button class="bg-btn b-white" data-bg="white" title="White background"></button>
  </div>

  <!-- Zoom controls -->
  <div class="zoom-controls">
    <label>Zoom: <select id="zoomSelect">
      <option value="1">1x</option>
      <option value="2">2x</option>
      <option value="4">4x</option>
      <option value="8">8x</option>
    </select></label>
  </div>

  <!-- Comparison slider: Original vs Reconstructed -->
  <div class="comparison-wrapper">
    <div class="comparison-container" id="compContainer">
      <canvas id="origCanvas"></canvas>
      <canvas id="reconCanvas" class="recon-canvas"></canvas>
      <span class="comp-label left-label">Original</span>
      <span class="comp-label right-label">Reconstructed</span>
      <div class="comp-divider" id="compDivider"></div>
      <div class="ninepatch-overlay" id="compOverlay" style="display:none;">
        <div class="np-edge np-top"></div>
        <div class="np-edge np-bottom"></div>
        <div class="np-edge np-left"></div>
        <div class="np-edge np-right"></div>
      </div>
    </div>
  </div>

  <!-- Compressed image -->
  <div class="compressed-row">
    <h3>Compressed</h3>
    <div class="comp-canvas-wrapper" id="compCanvasWrapper">
      <canvas id="compCanvas"></canvas>
      <div class="ninepatch-overlay" id="compCanvasOverlay" style="display:none;">
        <div class="np-edge np-top"></div>
        <div class="np-edge np-bottom"></div>
        <div class="np-edge np-left"></div>
        <div class="np-edge np-right"></div>
      </div>
    </div>
    <div class="compressed-info" id="compInfo"></div>
  </div>

  <!-- Results -->
  <div class="results" id="results" style="display:none;"></div>

<script>
const $ = id => document.getElementById(id);
const sourceSelect = $('sourceSelect');
const sampleSelect = $('sampleSelect');
const fileInput = $('fileInput');
const runBtn = $('runBtn');
const thresholdInput = $('thresholdInput');
const minSavingsInput = $('minSavingsInput');
const minCornerInput = $('minCornerInput');
const statusEl = $('status');
const origCanvas = $('origCanvas');
const reconCanvas = $('reconCanvas');
const compCanvas = $('compCanvas');
const compContainer = $('compContainer');
const compDivider = $('compDivider');
const compInfo = $('compInfo');
const resultsEl = $('results');

let currentFile = null;
let currentSample = null;
let origBlobUrl = null;
let reconBlobUrl = null;
let sampleBlobUrls = {};
let sliderPercent = 50;
let isDragging = false;
let zoomFactor = 1;
let currentMetadata = null;

// ---- Apply zoom factor to canvas CSS display size ----
function applyZoom(canvas) {
  canvas.style.width = (canvas.width * zoomFactor) + 'px';
  canvas.style.height = (canvas.height * zoomFactor) + 'px';
}

// ---- Position nine-patch DOM overlay (comparison view) ----
function showCompOverlay(metadata) {
  currentMetadata = metadata;
  const overlay = $('compOverlay');
  const {xb, xe, yb, ye} = metadata;
  overlay.querySelector('.np-top').style.top = (yb * zoomFactor) + 'px';
  overlay.querySelector('.np-bottom').style.top = (ye * zoomFactor) + 'px';
  overlay.querySelector('.np-left').style.left = (xb * zoomFactor) + 'px';
  overlay.querySelector('.np-right').style.left = (xe * zoomFactor) + 'px';
  overlay.style.display = '';
}

// ---- Position nine-patch DOM overlay (compressed view) ----
function showCompCanvasOverlay(metadata) {
  currentMetadata = metadata;
  const overlay = $('compCanvasOverlay');
  const {comp_xb: xb, comp_xe: xe, comp_yb: yb, comp_ye: ye} = metadata;
  overlay.querySelector('.np-top').style.top = (yb * zoomFactor) + 'px';
  overlay.querySelector('.np-bottom').style.top = (ye * zoomFactor) + 'px';
  overlay.querySelector('.np-left').style.left = (xb * zoomFactor) + 'px';
  overlay.querySelector('.np-right').style.left = (xe * zoomFactor) + 'px';
  overlay.style.display = '';
}

function hideOverlays() {
  $('compOverlay').style.display = 'none';
  $('compCanvasOverlay').style.display = 'none';
  currentMetadata = null;
}

// ---- Draw canvas from blob URL, proportionally scaled ----
function drawCanvasFromUrl(canvas, url) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, 0, 0);
      applyZoom(canvas);
      compContainer.style.width = (canvas.width * zoomFactor) + 'px';
      compContainer.style.height = (canvas.height * zoomFactor) + 'px';
      resolve();
    };
    img.onerror = () => resolve();
    img.src = url;
  });
}

// ---- Draw canvas with nine-patch overlay, proportionally scaled ----
function drawCanvasWithOverlay(canvas, url, metadata) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      const ctx = canvas.getContext('2d');
      ctx.imageSmoothingEnabled = false; // point sampling for pixel-perfect
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, 0, 0);
      if (metadata) showCompOverlay(metadata);
      // CSS display: 1 canvas pixel = 1 CSS pixel (with zoom)
      applyZoom(canvas);
      compContainer.style.width = (canvas.width * zoomFactor) + 'px';
      compContainer.style.height = (canvas.height * zoomFactor) + 'px';
      resolve();
    };
    img.onerror = () => resolve();
    img.src = url;
  });
}

// ---- Status ----
function setStatus(msg, type) {
  statusEl.textContent = msg;
  statusEl.className = 'status ' + type;
}
function clearStatus() { statusEl.className = 'status'; statusEl.textContent = ''; }

// ---- Load samples list & pre-load blobs ----
async function initSamples() {
  try {
    const res = await fetch('/api/samples');
    const names = await res.json();
    for (const name of names) {
      sampleSelect.appendChild(new Option(name, name));
    }
    // Pre-load all sample blobs for instant display
    for (const name of names) {
      try {
        const r = await fetch('/api/sample/' + encodeURIComponent(name));
        const blob = await r.blob();
        sampleBlobUrls[name] = URL.createObjectURL(blob);
      } catch (e) { /* skip */ }
    }
  } catch (e) {
    setStatus('Failed to load samples: ' + e.message, 'error');
  }
}

// ---- Update source-dependent UI ----
function updateSourceUI() {
  const v = sourceSelect.value;
  sampleSelect.style.display = v === 'samples' ? '' : 'none';
  fileInput.style.display = v === 'upload' ? '' : 'none';
  runBtn.disabled = true;
  clearOrigPreview();
  // If switching to samples, auto-load the currently selected sample
  if (v === 'samples' && sampleSelect.value) {
    handleSampleSelect(sampleSelect.value);
  }
}

function clearOrigPreview() {
  const ctx = origCanvas.getContext('2d');
  ctx.clearRect(0, 0, origCanvas.width, origCanvas.height);
  origCanvas.style.width = '0px'; origCanvas.style.height = '0px';
}

// ---- Handle file upload: instant preview via createObjectURL ----
function handleFileSelect(file) {
  if (!file) return;
  currentFile = file;
  currentSample = null;
  if (origBlobUrl) URL.revokeObjectURL(origBlobUrl);
  origBlobUrl = URL.createObjectURL(file);
  drawCanvasFromUrl(origCanvas, origBlobUrl).then(() => {
    runBtn.disabled = false;
  });
  // Clear recon
  reconBlobUrl = null;
  clearReconPreview();
  clearResults();
}

function clearReconPreview() {
  const ctx = reconCanvas.getContext('2d');
  ctx.clearRect(0, 0, reconCanvas.width, reconCanvas.height);
  reconCanvas.style.width = '0px'; reconCanvas.style.height = '0px';
  $('compOverlay').style.display = 'none';
}

function clearResults() {
  resultsEl.style.display = 'none';
  compInfo.textContent = '';
  const ctx = compCanvas.getContext('2d');
  ctx.clearRect(0, 0, compCanvas.width, compCanvas.height);
  compCanvas.style.width = '0px'; compCanvas.style.height = '0px';
  hideOverlays();
}

// ---- Handle sample select: instant preview from cached blob ----
function handleSampleSelect(name) {
  if (!name) return;
  currentSample = name;
  currentFile = null;
  const url = sampleBlobUrls[name];
  if (url) {
    origBlobUrl = url;
    drawCanvasFromUrl(origCanvas, url).then(() => {
      runBtn.disabled = false;
    });
  }
  // Clear recon
  reconBlobUrl = null;
  clearReconPreview();
  clearResults();
}

// ---- Draw compressed canvas: at compressed image natural size with nine-patch overlay ----
function drawCompressed(canvas, url, metadata) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      const ctx = canvas.getContext('2d');
      ctx.imageSmoothingEnabled = false;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, 0, 0);
      applyZoom(canvas);
      if (metadata) showCompCanvasOverlay(metadata);
      resolve();
    };
    img.onerror = () => resolve();
    img.src = url;
  });
}
// ---- Run compression ----
async function runCompression() {
  runBtn.disabled = true;
  setStatus('Compressing...', 'info');
  clearStatus();

  const fd = new FormData();
  fd.set('error_threshold', thresholdInput.value);
  fd.set('min_savings', minSavingsInput.value);
  fd.set('min_corner', minCornerInput.value);

  if (currentFile) {
    fd.set('file', currentFile);
  } else if (currentSample) {
    fd.set('sample', currentSample);
  } else {
    setStatus('No source selected', 'error');
    runBtn.disabled = false;
    return;
  }

  try {
    const res = await fetch('/api/compress', { method: 'POST', body: fd });
    const data = await res.json();
    if (!res.ok) { setStatus(data.error || 'Server error', 'error'); runBtn.disabled = false; return; }
    if (data.status === 'skipped') { setStatus(data.reason || 'Skipped', 'info'); runBtn.disabled = false; return; }
    if (data.not_worth) { setStatus(data.message || 'Not worth compressing', 'info'); runBtn.disabled = false; return; }

    // Original already shown via instant preview; just re-draw if needed
    if (data.original_png && !origBlobUrl) {
      // Fallback: shouldn't happen but just in case
      const blob = b64toBlob(data.original_png);
      origBlobUrl = URL.createObjectURL(blob);
      await drawCanvasFromUrl(origCanvas, origBlobUrl);
    }

    // Reconstructed: draw with overlay on recon canvas (top layer of comparison)
    const reconBlob = b64toBlob(data.reconstructed_png);
    reconBlobUrl = URL.createObjectURL(reconBlob);
    await drawCanvasWithOverlay(reconCanvas, reconBlobUrl, data.metadata);

    // Compressed: draw upscaled to original dimensions with point sampling
    const compBlob = b64toBlob(data.compressed_png);
    const compUrl = URL.createObjectURL(compBlob);
    await drawCompressed(compCanvas, compUrl, data.metadata);

    // Info
    const m = data.metadata;
    compInfo.textContent = `${m.compressed_w} x ${m.compressed_h} pixels`;

    // Results table
    resultsEl.style.display = 'block';
    resultsEl.innerHTML = `<table>
      <tr><td>Original</td><td>${m.original_w} x ${m.original_h}</td></tr>
      <tr><td>Compressed</td><td>${m.compressed_w} x ${m.compressed_h}</td></tr>
      <tr><td>Savings</td><td>${m.savings_pct.toFixed(1)}%</td></tr>
      <tr><td>Nine-patch (original)</td><td>(${m.xb}, ${m.yb}, ${m.xe - m.xb}, ${m.ye - m.yb})</td></tr>
      <tr><td>Nine-patch (compressed)</td><td>(${m.comp_xb}, ${m.comp_yb}, ${m.comp_xe - m.comp_xb}, ${m.comp_ye - m.comp_yb})</td></tr>
      <tr><td>Max error</td><td>${data.error_2d}</td></tr>
    </table>`;

    setStatus('Done!', 'success');
  } catch (e) {
    setStatus('Request failed: ' + e.message, 'error');
  }
  runBtn.disabled = false;
}

function b64toBlob(b64) {
  const bytes = atob(b64);
  const arr = new Uint8Array(bytes.length);
  for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
  return new Blob([arr], { type: 'image/png' });
}

// ---- Comparison slider logic ----
function updateSlider(pct) {
  sliderPercent = Math.max(0, Math.min(100, pct));
  reconCanvas.style.clipPath = `inset(0 ${100 - sliderPercent}% 0 0)`;
  compDivider.style.left = sliderPercent + '%';
}

// ---- Re-apply zoom to all visible canvases ----
function reapplyZoom() {
  if (origCanvas.width > 0) applyZoom(origCanvas);
  if (reconCanvas.width > 0) applyZoom(reconCanvas);
  if (origCanvas.width > 0) {
    compContainer.style.width = (origCanvas.width * zoomFactor) + 'px';
    compContainer.style.height = (origCanvas.height * zoomFactor) + 'px';
  }
  if (compCanvas.width > 0) applyZoom(compCanvas);
  updateSlider(50);
  if (currentMetadata) {
    showCompOverlay(currentMetadata);
    showCompCanvasOverlay(currentMetadata);
  }
}

$('zoomSelect').addEventListener('change', () => {
  zoomFactor = parseInt($('zoomSelect').value, 10);
  reapplyZoom();
});

compDivider.addEventListener('mousedown', e => { isDragging = true; e.preventDefault(); });
document.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const rect = compContainer.getBoundingClientRect();
  const pct = ((e.clientX - rect.left) / rect.width) * 100;
  updateSlider(pct);
});
document.addEventListener('mouseup', () => { isDragging = false; });

// Touch support
compDivider.addEventListener('touchstart', e => { isDragging = true; e.preventDefault(); });
document.addEventListener('touchmove', e => {
  if (!isDragging) return;
  const touch = e.touches[0];
  const rect = compContainer.getBoundingClientRect();
  const pct = ((touch.clientX - rect.left) / rect.width) * 100;
  updateSlider(pct);
});
document.addEventListener('touchend', () => { isDragging = false; });

// ---- Background switcher ----
document.querySelectorAll('.bg-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.bg-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    compContainer.className = 'comparison-container';
    const bg = btn.dataset.bg;
    if (bg !== 'checker') compContainer.classList.add('bg-' + bg);
  });
});

// ---- Event listeners ----
sourceSelect.addEventListener('change', updateSourceUI);
fileInput.addEventListener('change', e => handleFileSelect(e.target.files[0]));
sampleSelect.addEventListener('change', e => handleSampleSelect(e.target.value));
runBtn.addEventListener('click', runCompression);

// ---- Init ----
initSamples();
updateSourceUI();
</script>
</body>
</html>
